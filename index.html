<body>
  <!--DIOS ES MI SALVADOR[START]-->
  <header class="wiheader">
    <div class="nv_left">
      <h1 class="wilogo"></h1>
      <nav class="winav"></nav>
    </div><!--1 LEFT - NAVS -->
    <div class="nv_right"></div><!--2 RIGHT - AUTH -->
    <div class="wimenu dpn"><i class="fas fa-bars"></i></div><!--3 MOVIL-->
  </header>
  <main id="wimain"></main><!--CONTENIDO PRINCIPAL-->
  <div id="wiTema">
    <div class="tema" data-ths="cielo|#0EBEFF"></div>
    <div class="tema" data-ths="dulce|#FF5C69"></div>
    <div class="tema" data-ths="paz|#29C72E"></div>
    <div class="tema mtha" data-ths="oro|#FFC107"></div>
    <div class="tema" data-ths="mora|#7000FF"></div>
    <div class="tema" data-ths="futuro|#21273B"></div>
  </div>
</body>
<script type="module">
  import { dtema } from './smiles/wii.js';
  (() => {
    const d = document, h = d.documentElement, w = d.querySelector('#wiTema');
    if (!w) return;
    const ts = [...w.querySelectorAll('.tema')],
          m = d.querySelector('meta[name="theme-color"]') || d.head.appendChild(Object.assign(d.createElement('meta'), { name: 'theme-color' })),
          st = t => {
            const [n, c] = t.dataset.ths.split('|');
            h.dataset.theme = n;
            m.content = c;
            localStorage.wiTema = t.dataset.ths;
            ts.forEach(x => x.classList.toggle('mtha', x === t))
          };
    w.addEventListener('click', e => e.target.matches('.tema') && st(e.target), { passive: !0 });
    const stored = localStorage.wiTema;
    let target = null;
    if (stored) {
      target = w.querySelector(`[data-ths="${stored}"]`);
    }
    if (!target && typeof dtema !== 'undefined' && dtema) {
      target = w.querySelector(`[data-ths^="${dtema}|"]`);
    }
    if (!target) {
      target = ts[1];
    }
    if (target) {
      st(target);
    }
  })();
</script>
<script type="module" src="./smiles/main.js" defer></script>
